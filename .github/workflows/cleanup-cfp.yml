name: Auto Cleanup Expired CFP

# Runs every Monday at 08:00 UTC (same cadence as the event-check workflow),
# and can be triggered manually for testing.
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  cleanup-cfp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Remove expired CFP links and dates
        run: python scripts/cleanup_cfp.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request with changes
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="auto/cleanup-expired-cfp"
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          git add README.md
          git commit -m "chore: remove expired CFP links and dates"
          git push origin "$BRANCH" --force

          # Create PR only when one doesn't already exist for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH - skipping creation."
          else
            gh pr create \
              --title "Auto: Remove expired CFP links ($(date +%Y-%m-%d))" \
              --body $'This PR was automatically created by the weekly **Auto Cleanup Expired CFP** workflow.\n\nRemoved CFP links and dates where the CFP deadline was more than 1 week ago.' \
              --label "automated"
          fi
